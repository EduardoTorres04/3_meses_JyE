<!DOCTYPE html>
<html>
<head>
  <title>3 Meses Juntos 💖</title>
  <style>
    body {
      text-align: center;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #ffe6f0, #ffd1dc);
      margin: 0;
      padding: 50px 20px;
    }

    h1 {
      color: #ff3385;
    }

    button {
      font-size: 20px;
      padding: 12px 25px;
      margin: 20px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      transition: 0.3s;
    }

    #si {
      background-color: #ff3385;
      color: white;
    }

    #si:hover {
      transform: scale(1.1);
    }

    #no {
      background-color: #ccc;
    }

    .galeria {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
      margin-top: 40px;
      padding: 20px;
    }

    .galeria img {
      width: 100%;
      border-radius: 15px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
      transition: transform 0.3s ease;
    }

    .galeria img:hover {
      transform: scale(1.05);
    }

    .carta {
      max-width: 700px;
      margin: 50px auto;
      background-color: white;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
      text-align: left;
      line-height: 1.6;
      font-size: 18px;
    }

    .firma {
      margin-top: 30px;
      text-align: right;
      font-style: italic;
    }

    .contenedor {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      gap: 40px;
      margin-top: 40px;
    }

    .lado {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .lado img {
      width: 180px;
      border-radius: 15px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
      transition: transform 0.3s ease;
    }

    .lado img:hover {
      transform: scale(1.05);
    }
    
  </style>
</head>
<body>

  <h1>💌 ¿Sabes quienes cumplen 3 meses en esta fecha tan hermosa? 💌</h1>

  <button id="si" onclick="mostrarGaleria()">Sí 💖</button>
  <button id="no" onmouseover="moverNo()">No 😢</button>

  <script>
    function mostrarGaleria() {
      document.body.innerHTML = `
        <h1>🥰 Feliz 3 Meses Mi Amor 💕</h1>
        <p>15 recuerdos, pero millones de momentos contigo.</p>

        <div class="contenedor">

        <div class="lado">
          <img src="Fotos/foto1.png">
          <img src="Fotos/foto2.png">
          <img src="Fotos/foto3.png">
          <img src="Fotos/foto4.png">
          <img src="Fotos/foto5.png">
          <img src="Fotos/foto6.png">
          <img src="Fotos/foto7.png">
          <img src="Fotos/foto8.png">
          <img src="Fotos/foto9.png">
          <img src="Fotos/foto10.png">
          <img src="Fotos/foto11.png">
          <img src="Fotos/foto12.png">
        </div>

        <div class="carta">
          <p>
            Mi amada Jadira 💕<br><br>
            Holi jaja, espero te encuentres bien amor mio, quiero que sepas que ya llevamos 3 meses wiiiiii
            jajajaja, dejame decirte que han sido unos meses locos en los cuales me has sacado completamente de mi zona de confort,
            quizas te preguntes por que y creo que es porque en todo el tiempo que llevo hasta ahora, nunca pense en encontrar a alguien
            a quien yo amase de la forma en que te amo a ti, quizas sueno inocente diciendolo pero esta bien porque es cierto, eres una persona
            increible, nunca dejas de sorprenderme el como eres, como haces las cosas, no se, todo tu me encanta y me hace querer ser mejor,
            mejor para ti y para mi. Realmente se me hace muy lindo amarte porque siento que queriendote logro quererme un poco mas cada día.<br>
            <br>
            Agradezco que me hayas dado el espacio para conocerte, 
            no somos las personas perfectas, pero me gustaria 
            creer que somos perfectos el uno para el otro, quiero tener mi 
            vida para conocernos mas, para compartir entre nosotros, amo la idea 
            de que la mujer con la que quiero y voy a compartir mi vida
            vas a ser tu. Quiero que no olvides
            que aunque existan momentos en los que no logremos entendernos del todo,
            nunca voy a dejar de quererlo todo contigo.<br>
            <br>
            Aunque pueda no ser muy romantico como esperas, quiero que sepas que te adoro 
            y te amo con todo mi corazón.<br>
            <br>
            Y como es costumbre te dejare un poema que me gustó.<br>
            <br>
            Hay besos que pronuncian por sí solos<br>
            la sentencia de amor condenatoria,<br>
            hay besos que se dan con la mirada<br>
            hay besos que se dan con la memoria.<br>
            <br>
            Hay besos silenciosos, besos nobles<br>
            hay besos enigmáticos, sinceros<br>
            hay besos que se dan sólo las almas<br>
            hay besos por prohibidos, verdaderos.<br>
            <br>
            Hay besos que calcinan y que hieren,<br>
            hay besos que arrebatan los sentidos,<br>
            hay besos misteriosos que han dejado<br>
            mil sueños errantes y perdidos.<br>
            <br>
            Hay besos problemáticos que encierran<br>
            una clave que nadie ha descifrado,<br>
            hay besos que engendran la tragedia<br>
            cuantas rosas en broche han deshojado.<br>
            <br>
            Hay besos perfumados, besos tibios<br>
            que palpitan en íntimos anhelos,<br>
            hay besos que en los labios dejan huellas<br>
            como un campo de sol entre dos hielos.<br>
            <br>
            Hay besos que parecen azucenas<br>
            por sublimes, ingenuos y por puros,<br>
            hay besos traicioneros y cobardes,<br>
            hay besos maldecidos y perjuros.<br>
            <br>
            Judas besa a Jesús y deja impresa<br>
            en su rostro de Dios, la felonía,<br>
            mientras la Magdalena con sus besos<br>
            fortifica piadosa su agonía.<br>
            <br>
            Desde entonces en los besos palpita<br>
            el amor, la traición y los dolores,<br>
            en las bodas humanas se parecen<br>
            a la brisa que juega con las flores.<br>
            <br>
            Hay besos que producen desvaríos<br>
            de amorosa pasión ardiente y loca,<br>
            tú los conoces bien son besos míos<br>
            inventados por mí, para tu boca.<br>
            <br>
            Besos de llama que en rastro impreso<br>
            llevan los surcos de un amor vedado,<br>
            besos de tempestad, salvajes besos<br>
            que solo nuestros labios han probado.<br>
            <br>
            ¿Te acuerdas del primero...? Indefinible;<br>
            cubrió tu faz de cárdenos sonrojos<br>
            y en los espasmos de emoción terrible,<br>
            llenáronse de lágrimas tus ojos.<br>
            <br>
            ¿Te acuerdas que una tarde en loco exceso<br>
            te vi celoso imaginando agravios,<br>
            te suspendí en mis brazos... vibró un beso,<br>
            y qué viste después...? Sangre en mis labios.<br>
            <br>
            Yo te enseñé a besar: los besos fríos<br>
            son de impasible corazón de roca,<br>
            yo te enseñé a besar con besos míos<br>
            inventados por mí, para tu boca.<br>
            <br>
          </p>

            <div class="firma">
            Con amor,<br>
            Tu Enamorado Yapapa
            </div>
          </div>

          <div class="lado">
            
            <img src="Fotos/foto13.png">
            <img src="Fotos/foto14.png">
            <img src="Fotos/foto15.png">
            <img src="Fotos/foto16.png">
            <img src="Fotos/foto17.png">
            <img src="Fotos/foto18.png">
            <img src="Fotos/foto19.png">
            <img src="Fotos/foto20.png">
            <img src="Fotos/foto21.png">
            <img src="Fotos/foto22.png">

          </div>
        </div>
      `;
    }

    function moverNo() {
      const botonNo = document.getElementById("no");
      botonNo.style.position = "absolute";
      botonNo.style.left = Math.random() * (window.innerWidth - 100) + "px";
      botonNo.style.top = Math.random() * (window.innerHeight - 50) + "px";
    }
  </script>

</body>
</html>
